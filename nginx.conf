server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript text/html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(html|css|js|ico|jpg|jpeg|png|gif|svg|woff|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }
}
